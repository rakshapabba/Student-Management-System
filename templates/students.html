
<!DOCTYPE html>
<html>
<head>
<title>Students</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">

<h2>Students</h2>

<form method="get">
<input name="search" placeholder="Search student name" class="form-control mb-3">
</form>

<table class="table table-bordered">
<tr>
<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Phone</th>
<th>Edit</th>
<th>Delete</th>
</tr>

{% for s in students %}
<tr>
<td>{{s[0]}}</td>
<td>{{s[1]}}</td>
<td>{{s[2]}}</td>
<td>{{s[3]}}</td>
<td><a class="btn btn-warning btn-sm" href="/edit/{{s[0]}}">Edit</a></td>
<td><a class="btn btn-danger btn-sm" href="/delete/{{s[0]}}">Delete</a></td>
</tr>
{% endfor %}

</table>

<a href="/dashboard" class="btn btn-secondary">Back</a>

</div>
</body>
</html>
