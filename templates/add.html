
<!DOCTYPE html>
<html>
<head>
<title>Add Student</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
<h2>Add Student</h2>

<form method="post">
<input class="form-control mb-2" name="id" placeholder="Student ID">
<input class="form-control mb-2" name="name" placeholder="Name">
<input class="form-control mb-2" name="dept" placeholder="Department">
<input class="form-control mb-2" name="phone" placeholder="Phone">
<button class="btn btn-primary">Add</button>
</form>

</div>
</body>
</html>
